# ─── Sandbox / Code Execution ─────────────────────────────────────────────────

input SandboxMountInput {
  hostPath: String!
  containerPath: String!
  readOnly: Boolean
}

type SandboxInstance {
  id: String!
  image: String!
  status: String!
  userId: String!
  memLimit: Int!
  cpuLimit: Float!
  netPolicy: String!
  persistent: Boolean!
  createdAt: String!
}

type SandboxResult {
  exitCode: Int!
  stdout: String!
  stderr: String!
  durationMs: Int!
}

extend type Query {
  sandboxInstances: [SandboxInstance!]!
  sandboxInstance(id: String!): SandboxInstance
}

extend type Mutation {
  createSandbox(image: String!, persistent: Boolean, mounts: [SandboxMountInput!]): SandboxInstance!
  executeSandbox(id: String!, command: String!): SandboxResult!
  destroySandbox(id: String!): Boolean!
}
