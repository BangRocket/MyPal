# ─── Memory graph ─────────────────────────────────────────────────────────────

type MemoryNode {
  id:         String!
  label:      String
  type:       String
  value:      String
  createdAt:  String
  properties: JSON
}

type MemoryEdge {
  id:       String!
  sourceId: String!
  targetId: String!
  relation: String
}

type MemoryGraph {
  nodes: [MemoryNode!]!
  edges: [MemoryEdge!]!
}

type GraphNode {
  id:         String!
  label:      String
  type:       String
  value:      String
  properties: JSON
}

type GraphEdge {
  source: String!
  target: String!
  label:  String
}

type UserGraphResult {
  success: Boolean!
  nodes:   [GraphNode!]
  edges:   [GraphEdge!]
  error:   String
}

type SearchMemoryResult {
  success: Boolean!
  result:  String
  error:   String
}

type AddRelationResult {
  success: Boolean!
  error:   String
}

type CypherResult {
  success: Boolean!
  data:    JSON
  error:   String
}

# ─── Enhanced memory (vector + graph) ────────────────────────────────────────

type VectorSearchResult {
  id:        String!
  content:   String!
  score:     Float!
  userId:    String!
  metadata:  String
  createdAt: String!
}

type GraphEntity {
  id:         String!
  type:       String!
  name:       String!
  userId:     String!
  properties: String
  createdAt:  String!
}

type GraphRelation {
  id:       String!
  fromId:   String!
  toId:     String!
  type:     String!
  weight:   Float!
  metadata: String
}

type GraphNeighborResult {
  entities:  [GraphEntity!]!
  relations: [GraphRelation!]!
}

type MemoryStats {
  vectorCount:   Int!
  entityCount:   Int!
  relationCount: Int!
}

extend type Query {
  searchMemory(query: String!): SearchMemoryResult
  userGraph(userId: String): UserGraphResult
  memory: MemoryGraph
  vectorSearch(userId: String!, query: String!, topK: Int): [VectorSearchResult!]!
  graphNeighbors(entityId: String!, depth: Int): GraphNeighborResult!
  memoryStats(userId: String!): MemoryStats!
}

extend type Mutation {
  addMemory(content: String!): MutationResult!
  addMemoryNode(
    label: String!
    type:  String!
    value: String!
  ): MemoryNode!
  updateMemoryNode(
    id:         String!
    label:      String
    type:       String
    value:      String
    properties: String
  ): MemoryNode!
  deleteMemoryNode(id: String!): Boolean!
  addRelation(
    from:         String!
    to:           String!
    relationType: String!
  ): AddRelationResult!
  executeCypher(cypher: String!): CypherResult!
  rememberMemory(userId: String!, content: String!, metadata: String): Boolean!
  forgetMemory(id: String!): Boolean!
  bootstrapMemory(userId: String!, profile: String!): Boolean!
}
