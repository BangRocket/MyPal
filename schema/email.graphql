# ─── Email Channel Config ────────────────────────────────────────────────────

type EmailFilterRule {
  field: String!
  pattern: String!
  action: String!
}

type EmailChannelConfig {
  enabled: Boolean!
  imapHost: String!
  imapPort: Int!
  imapUser: String!
  imapTls: Boolean!
  smtpHost: String!
  smtpPort: Int!
  smtpFrom: String!
  smtpTls: Boolean!
  pollInterval: Int!
  processedLabel: String!
  filters: [EmailFilterRule!]!
}

extend type Query {
  emailConfig: EmailChannelConfig!
}
